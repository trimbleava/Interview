<svg width="820" height="640" viewBox="0 0 820 640" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#854F0B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<style>
  text { font-family: -apple-system, Helvetica, Arial, sans-serif; }
  .box { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 1; rx: 8; }
  .box-teal { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 1; rx: 8; }
  .box-amber { fill: #FAEEDA; stroke: #854F0B; stroke-width: 1; rx: 8; }
  .title { font-size: 14px; font-weight: 600; fill: #2C2C2A; }
  .title-teal { font-size: 14px; font-weight: 600; fill: #085041; }
  .title-amber { font-size: 14px; font-weight: 600; fill: #633806; }
  .sub { font-size: 11.5px; fill: #444441; }
  .sub-teal { font-size: 11.5px; fill: #0F6E56; }
  .sub-amber { font-size: 11.5px; fill: #854F0B; }
  .section { font-size: 12px; font-weight: 600; fill: #888780; letter-spacing: 0.5px; }
</style>

<text x="30" y="28" class="section">MCP CONNECTOR SUITE — EXTERNAL SIGNAL ACQUISITION</text>

<!-- 1. MCP client -->
<rect x="30" y="50" width="240" height="56" class="box"/>
<text x="150" y="72" text-anchor="middle" class="title">MCP client</text>
<text x="150" y="90" text-anchor="middle" class="sub">Claude Desktop or any MCP-speaking app</text>

<line x1="150" y1="106" x2="150" y2="140" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

<!-- 2. Reverse proxy -->
<rect x="30" y="140" width="240" height="56" class="box"/>
<text x="150" y="162" text-anchor="middle" class="title">Nginx reverse proxy</text>
<text x="150" y="180" text-anchor="middle" class="sub">routes by port to each service</text>

<line x1="150" y1="196" x2="150" y2="230" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrow-teal)"/>

<!-- 3. MCP servers group -->
<rect x="30" y="230" width="240" height="80" class="box-teal"/>
<text x="150" y="252" text-anchor="middle" class="title-teal">9 platform MCP servers</text>
<text x="150" y="270" text-anchor="middle" class="sub-teal">BlueSky, X, LinkedIn, YouTube,</text>
<text x="150" y="284" text-anchor="middle" class="sub-teal">TikTok, Instagram, Facebook,</text>
<text x="150" y="298" text-anchor="middle" class="sub-teal">News API, Deep Research</text>

<line x1="150" y1="310" x2="150" y2="344" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrow-teal)"/>

<!-- 4. Data acquisition adapter -->
<rect x="30" y="344" width="240" height="80" class="box-teal"/>
<text x="150" y="366" text-anchor="middle" class="title-teal">Data acquisition adapter</text>
<text x="150" y="384" text-anchor="middle" class="sub-teal">thin, stateless — calls MCP tools,</text>
<text x="150" y="398" text-anchor="middle" class="sub-teal">normalizes into an Observation</text>
<text x="150" y="412" text-anchor="middle" class="sub-teal">schema with provenance, no storage</text>

<line x1="150" y1="424" x2="150" y2="458" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

<!-- 5. Downstream -->
<rect x="30" y="458" width="240" height="56" class="box"/>
<text x="150" y="480" text-anchor="middle" class="title" font-size="13px">Normalized observations</text>
<text x="150" y="498" text-anchor="middle" class="sub">handed off to downstream ingestion</text>

<!-- Side: config manager -->
<rect x="330" y="140" width="240" height="80" class="box-amber"/>
<text x="450" y="162" text-anchor="middle" class="title-amber">Config manager</text>
<text x="450" y="180" text-anchor="middle" class="sub-amber">.env.local → .env.{environment} →</text>
<text x="450" y="194" text-anchor="middle" class="sub-amber">.env.example, one source of truth</text>
<text x="450" y="208" text-anchor="middle" class="sub-amber">for every service's configuration</text>
<line x1="330" y1="180" x2="272" y2="164" stroke="#854F0B" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- Side: CI/CD -->
<rect x="330" y="344" width="240" height="80" class="box-amber"/>
<text x="450" y="366" text-anchor="middle" class="title-amber">Jenkins CI/CD</text>
<text x="450" y="384" text-anchor="middle" class="sub-amber">parameterized build → test → deploy</text>
<text x="450" y="398" text-anchor="middle" class="sub-amber">per service, plus a health-check pass</text>
<text x="450" y="412" text-anchor="middle" class="sub-amber">across all 9 ports before release</text>
<line x1="330" y1="384" x2="272" y2="384" stroke="#854F0B" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

</svg>
