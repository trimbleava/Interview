<svg width="820" height="700" viewBox="0 0 820 700" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<style>
  text { font-family: -apple-system, Helvetica, Arial, sans-serif; }
  .box { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 1; rx: 8; }
  .box-teal { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 1; rx: 8; }
  .box-amber { fill: #FAEEDA; stroke: #854F0B; stroke-width: 1; rx: 8; }
  .title { font-size: 14px; font-weight: 600; fill: #2C2C2A; }
  .title-teal { font-size: 14px; font-weight: 600; fill: #085041; }
  .title-amber { font-size: 14px; font-weight: 600; fill: #633806; }
  .sub { font-size: 11.5px; fill: #444441; }
  .sub-teal { font-size: 11.5px; fill: #0F6E56; }
  .sub-amber { font-size: 11.5px; fill: #854F0B; }
  .section { font-size: 12px; font-weight: 600; fill: #888780; letter-spacing: 0.5px; }
</style>

<text x="30" y="30" class="section">MATLAB → ArcGIS FGDB PIPELINE</text>

<!-- 1. Config CSV -->
<rect x="30" y="50" width="240" height="56" class="box"/>
<text x="150" y="72" text-anchor="middle" class="title">Scenario config CSV</text>
<text x="150" y="90" text-anchor="middle" class="sub">list of HDF5 / SIO files per run</text>

<line x1="150" y1="106" x2="150" y2="140" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

<!-- 2. CLI entrypoint -->
<rect x="30" y="140" width="240" height="56" class="box"/>
<text x="150" y="162" text-anchor="middle" class="title">matlab_to_arcpy.py</text>
<text x="150" y="180" text-anchor="middle" class="sub">CLI, sets mp start method (spawn/fork)</text>

<line x1="150" y1="196" x2="150" y2="230" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

<!-- 3. ScenarioProcessor -->
<rect x="30" y="230" width="240" height="66" class="box-teal"/>
<text x="150" y="252" text-anchor="middle" class="title-teal">ScenarioProcessor</text>
<text x="150" y="270" text-anchor="middle" class="sub-teal">loads state.json, filters out</text>
<text x="150" y="285" text-anchor="middle" class="sub-teal">already-completed files</text>

<line x1="150" y1="296" x2="150" y2="330" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrow-teal)"/>

<!-- 4. Process pool -->
<rect x="30" y="330" width="240" height="66" class="box-teal"/>
<text x="150" y="352" text-anchor="middle" class="title-teal">ProcessPoolExecutor</text>
<text x="150" y="370" text-anchor="middle" class="sub-teal">N workers, sized by CPU count</text>
<text x="150" y="385" text-anchor="middle" class="sub-teal">and available RAM per file</text>

<line x1="150" y1="396" x2="150" y2="430" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrow-teal)"/>

<!-- 5. Factory dispatch -->
<rect x="30" y="430" width="240" height="66" class="box"/>
<text x="150" y="452" text-anchor="middle" class="title">create_processor() factory</text>
<text x="150" y="470" text-anchor="middle" class="sub">inspects HDF5/MAT keys, matches</text>
<text x="150" y="485" text-anchor="middle" class="sub">to a registered processor class</text>

<line x1="150" y1="496" x2="150" y2="530" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

<!-- 6. Processor subclasses -->
<rect x="30" y="530" width="240" height="80" class="box"/>
<text x="150" y="550" text-anchor="middle" class="title">Processor subclasses</text>
<text x="150" y="568" text-anchor="middle" class="sub">Temperature · Hydrodynamic</text>
<text x="150" y="583" text-anchor="middle" class="sub">MultiDimensional · Velocity</text>
<text x="150" y="598" text-anchor="middle" class="sub">Scalar · Boundary</text>

<line x1="150" y1="610" x2="150" y2="644" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

<!-- 7. Output -->
<rect x="30" y="644" width="240" height="46" class="box"/>
<text x="150" y="668" text-anchor="middle" class="title" font-size="13px">ArcGIS File Geodatabase (.gdb)</text>

<!-- Registry side note -->
<rect x="330" y="430" width="220" height="66" class="box-amber"/>
<text x="440" y="452" text-anchor="middle" class="title-amber">register_all_processors.py</text>
<text x="440" y="470" text-anchor="middle" class="sub-amber">registers each processor module</text>
<text x="440" y="485" text-anchor="middle" class="sub-amber">so the factory can find it</text>
<line x1="330" y1="463" x2="272" y2="463" stroke="#854F0B" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- Progress monitor side note -->
<rect x="330" y="330" width="220" height="80" class="box-amber"/>
<text x="440" y="352" text-anchor="middle" class="title-amber">ProgressMonitor</text>
<text x="440" y="370" text-anchor="middle" class="sub-amber">background thread + mp.Queue</text>
<text x="440" y="385" text-anchor="middle" class="sub-amber">per-file % progress, console bar,</text>
<text x="440" y="398" text-anchor="middle" class="sub-amber">JSON progress log per file</text>
<line x1="330" y1="370" x2="272" y2="363" stroke="#854F0B" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- Checkpoint side note -->
<rect x="330" y="530" width="220" height="80" class="box-amber"/>
<text x="440" y="552" text-anchor="middle" class="title-amber">Checkpoint / resume</text>
<text x="440" y="570" text-anchor="middle" class="sub-amber">per-file checkpoint json lets a</text>
<text x="440" y="585" text-anchor="middle" class="sub-amber">crashed or killed run pick back up</text>
<text x="440" y="598" text-anchor="middle" class="sub-amber">mid-batch instead of restarting</text>
<line x1="330" y1="563" x2="272" y2="563" stroke="#854F0B" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

</svg>
