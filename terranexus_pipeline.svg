<svg width="860" height="640" viewBox="0 0 860 640" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-coral" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#993C1D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<style>
  text { font-family: -apple-system, Helvetica, Arial, sans-serif; }
  .box { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 1; rx: 8; }
  .box-teal { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 1; rx: 8; }
  .box-amber { fill: #FAEEDA; stroke: #854F0B; stroke-width: 1; rx: 8; }
  .box-coral { fill: #FAECE7; stroke: #993C1D; stroke-width: 1; rx: 8; }
  .title { font-size: 14px; font-weight: 600; fill: #2C2C2A; }
  .title-teal { font-size: 14px; font-weight: 600; fill: #085041; }
  .title-amber { font-size: 14px; font-weight: 600; fill: #633806; }
  .title-coral { font-size: 14px; font-weight: 600; fill: #712B13; }
  .sub { font-size: 11.5px; fill: #444441; }
  .sub-teal { font-size: 11.5px; fill: #0F6E56; }
  .sub-amber { font-size: 11.5px; fill: #854F0B; }
  .sub-coral { font-size: 11.5px; fill: #993C1D; }
  .section { font-size: 12px; font-weight: 600; fill: #888780; letter-spacing: 0.5px; }
  .topic { font-size: 10.5px; fill: #888780; font-style: italic; }
</style>

<text x="30" y="28" class="section">TERRANEXUS — EVENT-DRIVEN GEOSPATIAL PLATFORM</text>

<!-- External connectors -->
<rect x="30" y="50" width="220" height="66" class="box-coral"/>
<text x="140" y="72" text-anchor="middle" class="title-coral">External connectors</text>
<text x="140" y="90" text-anchor="middle" class="sub-coral">social, weather, geospatial APIs</text>
<text x="140" y="104" text-anchor="middle" class="sub-coral">normalized to a common schema</text>

<line x1="250" y1="83" x2="310" y2="83" stroke="#993C1D" stroke-width="1" marker-end="url(#arrow-coral)"/>

<!-- Kafka bus (central spine) -->
<rect x="310" y="50" width="220" height="480" class="box" rx="10"/>
<text x="420" y="76" text-anchor="middle" class="title">Kafka event bus</text>
<text x="420" y="94" text-anchor="middle" class="sub">topic-per-stage, consumer groups</text>

<line x1="420" y1="104" x2="420" y2="150" stroke="#5F5E5A" stroke-width="1"/>
<text x="420" y="140" text-anchor="middle" class="topic">ingest.impact</text>

<!-- Ingestion service -->
<rect x="330" y="150" width="180" height="70" class="box-teal"/>
<text x="420" y="172" text-anchor="middle" class="title-teal">Ingestion service</text>
<text x="420" y="190" text-anchor="middle" class="sub-teal">Kafka consumer + dispatch table</text>
<text x="420" y="204" text-anchor="middle" class="sub-teal">fuses &amp; canonicalizes sources</text>

<line x1="420" y1="220" x2="420" y2="266" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrow-teal)"/>
<text x="420" y="256" text-anchor="middle" class="topic">sim.trigger</text>

<!-- Simulation service -->
<rect x="330" y="266" width="180" height="70" class="box-teal"/>
<text x="420" y="288" text-anchor="middle" class="title-teal">Simulation service</text>
<text x="420" y="306" text-anchor="middle" class="sub-teal">event-driven model executor</text>
<text x="420" y="320" text-anchor="middle" class="sub-teal">runs scenario / scientific models</text>

<line x1="420" y1="336" x2="420" y2="382" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrow-teal)"/>
<text x="420" y="372" text-anchor="middle" class="topic">model.processed</text>

<!-- Orchestration service -->
<rect x="330" y="382" width="180" height="70" class="box-teal"/>
<text x="420" y="404" text-anchor="middle" class="title-teal">Orchestration service</text>
<text x="420" y="422" text-anchor="middle" class="sub-teal">decision logic &amp; analytics</text>
<text x="420" y="436" text-anchor="middle" class="sub-teal">consumes processed results</text>

<line x1="420" y1="452" x2="420" y2="498" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Datastores -->
<rect x="330" y="498" width="180" height="18" class="box" fill="#F1EFE8"/>
<text x="420" y="512" text-anchor="middle" class="sub">writes land in Postgres/PostGIS + MongoDB</text>

<!-- Gateway -->
<rect x="600" y="150" width="230" height="70" class="box-amber"/>
<text x="715" y="172" text-anchor="middle" class="title-amber">Schema-driven gateway</text>
<text x="715" y="190" text-anchor="middle" class="sub-amber">FastAPI, routes generated from a</text>
<text x="715" y="204" text-anchor="middle" class="sub-amber">YAML schema — no hardcoded routes</text>
<line x1="600" y1="185" x2="532" y2="185" stroke="#854F0B" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- Datastores box -->
<rect x="600" y="266" width="230" height="80" class="box-amber"/>
<text x="715" y="288" text-anchor="middle" class="title-amber">Datastores</text>
<text x="715" y="306" text-anchor="middle" class="sub-amber">Postgres/PostGIS — GiST spatial index</text>
<text x="715" y="320" text-anchor="middle" class="sub-amber">MongoDB — flexible document storage</text>
<line x1="600" y1="300" x2="532" y2="300" stroke="#854F0B" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- Storage abstraction -->
<rect x="600" y="382" width="230" height="80" class="box-amber"/>
<text x="715" y="404" text-anchor="middle" class="title-amber">Storage abstraction layer</text>
<text x="715" y="422" text-anchor="middle" class="sub-amber">factory pattern: blob storage vs.</text>
<text x="715" y="436" text-anchor="middle" class="sub-amber">local filesystem, chunked large-file upload</text>
<line x1="600" y1="416" x2="532" y2="416" stroke="#854F0B" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

</svg>
