<svg width="820" height="580" viewBox="0 0 820 580" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<style>
  text { font-family: -apple-system, Helvetica, Arial, sans-serif; }
  .box { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 1; rx: 8; }
  .box-teal { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 1; rx: 8; }
  .box-amber { fill: #FAEEDA; stroke: #854F0B; stroke-width: 1; rx: 8; }
  .title { font-size: 14px; font-weight: 600; fill: #2C2C2A; }
  .title-teal { font-size: 14px; font-weight: 600; fill: #085041; }
  .title-amber { font-size: 14px; font-weight: 600; fill: #633806; }
  .sub { font-size: 11.5px; fill: #444441; }
  .sub-teal { font-size: 11.5px; fill: #0F6E56; }
  .sub-amber { font-size: 11.5px; fill: #854F0B; }
  .section { font-size: 12px; font-weight: 600; fill: #888780; letter-spacing: 0.5px; }
</style>

<text x="30" y="28" class="section">DFLOW — STORM SURGE MODEL VERIFICATION APP</text>

<!-- 1. Facet selection UI -->
<rect x="30" y="50" width="240" height="66" class="box"/>
<text x="150" y="72" text-anchor="middle" class="title">Facet selection UI</text>
<text x="150" y="90" text-anchor="middle" class="sub">Leaflet map + model/scenario/</text>
<text x="150" y="104" text-anchor="middle" class="sub">event/station picker</text>

<line x1="150" y1="116" x2="150" y2="150" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrow-teal)"/>

<!-- 2. Facet cache -->
<rect x="30" y="150" width="240" height="70" class="box-teal"/>
<text x="150" y="172" text-anchor="middle" class="title-teal">Facet cache (Redis)</text>
<text x="150" y="190" text-anchor="middle" class="sub-teal">cache-aside: cache.get → DB</text>
<text x="150" y="204" text-anchor="middle" class="sub-teal">fallback → cache.set</text>

<line x1="150" y1="220" x2="150" y2="254" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

<!-- 3. Verification graph builder -->
<rect x="30" y="254" width="240" height="80" class="box"/>
<text x="150" y="276" text-anchor="middle" class="title">Verification graph builder</text>
<text x="150" y="294" text-anchor="middle" class="sub">reads NetCDF model output +</text>
<text x="150" y="308" text-anchor="middle" class="sub">station observations, aligns</text>
<text x="150" y="322" text-anchor="middle" class="sub">them into a comparison series</text>

<line x1="150" y1="334" x2="150" y2="368" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrow-teal)"/>

<!-- 4. Result cache -->
<rect x="30" y="368" width="240" height="70" class="box-teal"/>
<text x="150" y="390" text-anchor="middle" class="title-teal">Result cache (Redis)</text>
<text x="150" y="408" text-anchor="middle" class="sub-teal">keyed by station + model +</text>
<text x="150" y="422" text-anchor="middle" class="sub-teal">scenario + event, skips recompute</text>

<line x1="150" y1="438" x2="150" y2="472" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

<!-- 5. Output -->
<rect x="30" y="472" width="240" height="50" class="box"/>
<text x="150" y="494" text-anchor="middle" class="title" font-size="13px">JSON graph payload</text>
<text x="150" y="512" text-anchor="middle" class="sub">rendered as a D3 time-series chart</text>

<!-- Side: PostGIS / GeoDjango -->
<rect x="330" y="150" width="240" height="90" class="box-amber"/>
<text x="450" y="172" text-anchor="middle" class="title-amber">PostGIS / GeoDjango</text>
<text x="450" y="190" text-anchor="middle" class="sub-amber">station, boundary &amp; coastline</text>
<text x="450" y="204" text-anchor="middle" class="sub-amber">geometries feed both the map</text>
<text x="450" y="218" text-anchor="middle" class="sub-amber">layer and the graph builder</text>
<line x1="330" y1="195" x2="272" y2="185" stroke="#854F0B" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- Side: Redis session store -->
<rect x="330" y="368" width="240" height="70" class="box-amber"/>
<text x="450" y="390" text-anchor="middle" class="title-amber">Redis session store</text>
<text x="450" y="408" text-anchor="middle" class="sub-amber">django-redis also backs the</text>
<text x="450" y="422" text-anchor="middle" class="sub-amber">cached_db session engine</text>
<line x1="330" y1="403" x2="272" y2="403" stroke="#854F0B" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

</svg>
