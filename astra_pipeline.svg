<svg width="820" height="620" viewBox="0 0 820 620" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#854F0B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-coral" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#993C1D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<style>
  text { font-family: -apple-system, Helvetica, Arial, sans-serif; }
  .box { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 1; rx: 8; }
  .box-teal { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 1; rx: 8; }
  .box-amber { fill: #FAEEDA; stroke: #854F0B; stroke-width: 1; rx: 8; }
  .box-coral { fill: #FAECE7; stroke: #993C1D; stroke-width: 1; rx: 8; }
  .title { font-size: 14px; font-weight: 600; fill: #2C2C2A; }
  .title-teal { font-size: 14px; font-weight: 600; fill: #085041; }
  .title-amber { font-size: 14px; font-weight: 600; fill: #633806; }
  .title-coral { font-size: 14px; font-weight: 600; fill: #712B13; }
  .sub { font-size: 11.5px; fill: #444441; }
  .sub-teal { font-size: 11.5px; fill: #0F6E56; }
  .sub-amber { font-size: 11.5px; fill: #854F0B; }
  .sub-coral { font-size: 11.5px; fill: #993C1D; }
  .section { font-size: 12px; font-weight: 600; fill: #888780; letter-spacing: 0.5px; }
</style>

<text x="30" y="28" class="section">ASTRA — AIRSPACE IMPACT ANALYSIS PIPELINE</text>

<!-- 1. Data acquisition -->
<rect x="250" y="50" width="280" height="60" class="box"/>
<text x="390" y="72" text-anchor="middle" class="title">Data acquisition</text>
<text x="390" y="90" text-anchor="middle" class="sub">FR24, adsb.lol, and FAA archives</text>

<line x1="390" y1="110" x2="390" y2="146" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrow-teal)"/>

<!-- 2. Azure ingestion pipeline -->
<rect x="250" y="146" width="280" height="70" class="box-teal"/>
<text x="390" y="168" text-anchor="middle" class="title-teal">Azure ingestion pipeline</text>
<text x="390" y="186" text-anchor="middle" class="sub-teal">raw → processed → normalized</text>
<text x="390" y="200" text-anchor="middle" class="sub-teal">→ daily spatial index</text>

<line x1="390" y1="216" x2="390" y2="252" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrow-teal)"/>

<!-- 3. Index query service -->
<rect x="250" y="252" width="280" height="70" class="box-teal"/>
<text x="390" y="274" text-anchor="middle" class="title-teal">Index query service</text>
<text x="390" y="292" text-anchor="middle" class="sub-teal">bbox + altitude pre-filter selects</text>
<text x="390" y="306" text-anchor="middle" class="sub-teal">only candidate trace files to load</text>

<line x1="390" y1="322" x2="390" y2="358" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

<!-- 4. 3D spatial intersection engine -->
<rect x="250" y="358" width="280" height="80" class="box"/>
<text x="390" y="380" text-anchor="middle" class="title">3D spatial intersection engine</text>
<text x="390" y="398" text-anchor="middle" class="sub">line-segment clipping + interpolation</text>
<text x="390" y="412" text-anchor="middle" class="sub">against lateral + altitude airspace bounds</text>

<!-- Branch down then out -->
<path d="M390 438 L390 456 L210 456 L210 476" fill="none" stroke="#854F0B" stroke-width="1" marker-end="url(#arrow-amber)"/>
<path d="M390 438 L390 456 L610 456 L610 476" fill="none" stroke="#993C1D" stroke-width="1" marker-end="url(#arrow-coral)"/>

<!-- 5a. CZML builder -->
<rect x="40" y="476" width="340" height="66" class="box-amber"/>
<text x="210" y="498" text-anchor="middle" class="title-amber">CZML builder</text>
<text x="210" y="516" text-anchor="middle" class="sub-amber">qualified tracks colored by traffic</text>
<text x="210" y="530" text-anchor="middle" class="sub-amber">category, served to the Cesium viewer</text>

<line x1="210" y1="542" x2="210" y2="566" stroke="#854F0B" stroke-width="1" marker-end="url(#arrow-amber)"/>

<rect x="40" y="566" width="340" height="40" class="box-amber"/>
<text x="210" y="590" text-anchor="middle" class="title-amber" font-size="13px">Interactive 3D flight viewer</text>

<!-- 5b. Report builder -->
<rect x="440" y="476" width="340" height="66" class="box-coral"/>
<text x="610" y="498" text-anchor="middle" class="title-coral">Report builder</text>
<text x="610" y="516" text-anchor="middle" class="sub-coral">narrative, table &amp; figure libraries</text>
<text x="610" y="530" text-anchor="middle" class="sub-coral">assembled into a report document</text>

<line x1="610" y1="542" x2="610" y2="566" stroke="#993C1D" stroke-width="1" marker-end="url(#arrow-coral)"/>

<rect x="440" y="566" width="340" height="40" class="box-coral"/>
<text x="610" y="590" text-anchor="middle" class="title-coral" font-size="13px">NEPA-style PDF compliance report</text>

</svg>
