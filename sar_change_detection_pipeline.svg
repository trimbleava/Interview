<svg width="820" height="600" viewBox="0 0 820 600" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#854F0B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<style>
  text { font-family: -apple-system, Helvetica, Arial, sans-serif; }
  .box { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 1; rx: 8; }
  .box-teal { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 1; rx: 8; }
  .box-amber { fill: #FAEEDA; stroke: #854F0B; stroke-width: 1; rx: 8; }
  .title { font-size: 14px; font-weight: 600; fill: #2C2C2A; }
  .title-teal { font-size: 14px; font-weight: 600; fill: #085041; }
  .title-amber { font-size: 14px; font-weight: 600; fill: #633806; }
  .sub { font-size: 11.5px; fill: #444441; }
  .sub-teal { font-size: 11.5px; fill: #0F6E56; }
  .sub-amber { font-size: 11.5px; fill: #854F0B; }
  .section { font-size: 12px; font-weight: 600; fill: #888780; letter-spacing: 0.5px; }
</style>

<text x="30" y="28" class="section">SATELLITE TIME-SERIES CHANGE DETECTION PIPELINE</text>

<!-- 1. Tile merge -->
<rect x="250" y="50" width="280" height="60" class="box"/>
<text x="390" y="72" text-anchor="middle" class="title">Tile merge</text>
<text x="390" y="90" text-anchor="middle" class="sub">rasterio mosaics raw tiles per AOI/date</text>

<line x1="390" y1="110" x2="390" y2="146" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

<!-- 2. Metadata grouping -->
<rect x="250" y="146" width="280" height="70" class="box"/>
<text x="390" y="168" text-anchor="middle" class="title">Metadata grouping</text>
<text x="390" y="186" text-anchor="middle" class="sub">NDJSON records grouped by tile + region,</text>
<text x="390" y="200" text-anchor="middle" class="sub">satellite ignored, sorted by date</text>

<line x1="390" y1="216" x2="390" y2="252" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrow-teal)"/>

<!-- 3. Sequential comparison -->
<rect x="250" y="252" width="280" height="70" class="box-teal"/>
<text x="390" y="274" text-anchor="middle" class="title-teal">Sequential comparison</text>
<text x="390" y="292" text-anchor="middle" class="sub-teal">consecutive pairs diffed in time order</text>
<text x="390" y="306" text-anchor="middle" class="sub-teal">(t1→t2, t2→t3, …), optional AOI clip</text>

<line x1="390" y1="322" x2="390" y2="358" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrow-teal)"/>

<!-- 4. Diff + threshold -->
<rect x="250" y="358" width="280" height="70" class="box-teal"/>
<text x="390" y="380" text-anchor="middle" class="title-teal">Diff, threshold, mask</text>
<text x="390" y="398" text-anchor="middle" class="sub-teal">pixel difference → binary change mask</text>
<text x="390" y="412" text-anchor="middle" class="sub-teal">→ red-highlight overlay</text>

<line x1="390" y1="428" x2="390" y2="464" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

<!-- 5. Output -->
<rect x="250" y="464" width="280" height="60" class="box"/>
<text x="390" y="486" text-anchor="middle" class="title" font-size="13px">Diff / mask / overlay images</text>
<text x="390" y="504" text-anchor="middle" class="sub">+ summary CSV, JSON, run report</text>

<!-- Side: storage abstraction -->
<rect x="30" y="146" width="180" height="90" class="box-amber"/>
<text x="120" y="168" text-anchor="middle" class="title-amber">Storage backend</text>
<text x="120" y="186" text-anchor="middle" class="sub-amber">common interface —</text>
<text x="120" y="200" text-anchor="middle" class="sub-amber">local filesystem or</text>
<text x="120" y="214" text-anchor="middle" class="sub-amber">Azure Blob, same code</text>
<text x="120" y="228" text-anchor="middle" class="sub-amber">path either way</text>
<line x1="210" y1="191" x2="248" y2="191" stroke="#854F0B" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- Side: geospatial clipping -->
<rect x="610" y="252" width="180" height="70" class="box-amber"/>
<text x="700" y="274" text-anchor="middle" class="title-amber">Geospatial clipping</text>
<text x="700" y="292" text-anchor="middle" class="sub-amber">rasterio AOI clip when</text>
<text x="700" y="306" text-anchor="middle" class="sub-amber">imagery is georeferenced</text>
<line x1="610" y1="287" x2="532" y2="287" stroke="#854F0B" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

</svg>
